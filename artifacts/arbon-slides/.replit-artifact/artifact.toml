kind = "slides"
previewPath = "/arbon-slides/"
title = "عربون — عرض تقديمي"
version = "1.0.0"
id = "artifacts/arbon-slides"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/arbon-slides/" ]
localPort = 21169

[services.development]
run = "pnpm --filter @workspace/arbon-slides run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arbon-slides", "run", "build" ]
publicDir = "artifacts/arbon-slides/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21169"
BASE_PATH = "/arbon-slides/"
