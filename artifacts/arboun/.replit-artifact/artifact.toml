kind = "web"
previewPath = "/"
title = "عربون"
version = "1.0.0"
id = "artifacts/arboun"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20301

[services.development]
run = "pnpm --filter @workspace/arboun run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arboun", "run", "build" ]
publicDir = "artifacts/arboun/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20301"
BASE_PATH = "/"
